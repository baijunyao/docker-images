name: CI

on: [push]

env:
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

jobs:
  changes:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      all: ${{ steps.filter.outputs.all }}
      alpine: ${{ steps.filter.outputs.alpine }}
      busybox: ${{ steps.filter.outputs.busybox }}
      cert_manager: ${{ steps.filter.outputs.cert_manager }}
      elasticsearch: ${{ steps.filter.outputs.elasticsearch }}
      fluentd: ${{ steps.filter.outputs.fluentd }}
      grafana: ${{ steps.filter.outputs.grafana }}
      kibana: ${{ steps.filter.outputs.kibana }}
      mysql_5_6: ${{ steps.filter.outputs.mysql_5_6 }}
      mysql_5_7: ${{ steps.filter.outputs.mysql_5_7 }}
      mysql_8_0: ${{ steps.filter.outputs.mysql_8_0 }}
      mysql_client: ${{ steps.filter.outputs.mysql_client }}
      nginx: ${{ steps.filter.outputs.nginx }}
      node_exporter: ${{ steps.filter.outputs.node_exporter }}
      ossutil: ${{ steps.filter.outputs.ossutil }}
      php: ${{ steps.filter.outputs.php }}
      php_nginx: ${{ steps.filter.outputs.php_nginx }}
      pnpm: ${{ steps.filter.outputs.pnpm }}
      prometheus: ${{ steps.filter.outputs.prometheus }}
      redis: ${{ steps.filter.outputs.redis }}
      ubuntu_bionic: ${{ steps.filter.outputs.ubuntu_bionic }}
      ubuntu_focal: ${{ steps.filter.outputs.ubuntu_focal }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            all:
              - '.github/workflows/CI.yml'
              - '.github/scripts/**'
              - '.github/actions/**'
            alpine:
              - 'alpine/**'
            busybox:
              - 'busybox/1.32/**'
            cert_manager:
              - '.github/workflows/CI.yml'
            elasticsearch:
              - 'elasticsearch/**'
            fluentd:
              - 'fluentd/1.11/**'
            grafana:
              - 'grafana/7.3.4/**'
            kibana:
              - 'kibana/7.10.1/**'
            mysql_5_6:
              - 'mysql/5.6/**'
            mysql_5_7:
              - 'mysql/5.7/**'
            mysql_8_0:
              - 'mysql/8.0/**'
            mysql_client:
              - 'mysql-client/1.1/**'
            nginx:
              - 'nginx/**'
            node_exporter:
              - 'node-exporter/1.1.2/**'
            ossutil:
              - 'ossutil/**'
            php:
              - 'php/**'
            php_nginx:
              - 'php-nginx/**'
            pnpm:
              - 'pnpm/**'
            prometheus:
              - 'prometheus/2.23.0/**'
            redis:
              - 'redis/6.0/**'
            ubuntu_bionic:
              - 'ubuntu/bionic/**'
            ubuntu_focal:
              - 'ubuntu/focal/**'

  ubuntu_bionic:
    name: Ubuntu Bionic
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.ubuntu_bionic == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh ubuntu/bionic/Dockerfile ubuntu/bionic baijunyao/ubuntu:bionic

  ubuntu_focal:
    name: Ubuntu Focal
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.ubuntu_focal == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh ubuntu/focal/Dockerfile ubuntu/focal baijunyao/ubuntu:focal

  busybox:
    name: BusyBox
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.busybox == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh busybox/1.32/Dockerfile busybox/1.32 baijunyao/busybox:1.32

  alpine:
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.alpine == 'true'
    strategy:
      matrix:
        version: [ "3.12", "3.23" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh alpine/Dockerfile alpine baijunyao/alpine:${{ matrix.version }} --build-arg ALPINE_VERSION=${{ matrix.version }}

  mysql-client:
    name: MySQL Client
    needs: [changes, alpine]
    if: >
      always() &&
      needs.alpine.result != 'failure' &&
      needs.alpine.result != 'cancelled' &&
      (
        needs.changes.outputs.all == 'true' ||
        needs.changes.outputs.alpine == 'true' ||
        needs.changes.outputs.mysql_client == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh mysql-client/1.1/Dockerfile mysql-client/1.1 baijunyao/mysql-client:1.1

  nginx:
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.nginx == 'true'
    strategy:
      matrix:
        version: [ "1.19", "1.29" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh nginx/Dockerfile nginx baijunyao/nginx:${{ matrix.version }} --build-arg NGINX_MAJOR_VERSION=${{ matrix.version }}

  mysql_8_0:
    name: MySQL 8.0
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.mysql_8_0 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh mysql/8.0/Dockerfile.local mysql/8.0 baijunyao/mysql:8.0-local
      - run: .github/scripts/build-and-push.sh mysql/8.0/Dockerfile.production mysql/8.0 baijunyao/mysql:8.0-production

  mysql_5_7:
    name: MySQL 5.7
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.mysql_5_7 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh mysql/5.7/Dockerfile.local mysql/5.7 baijunyao/mysql:5.7-local
        env:
          DOCKER_PLATFORMS: linux/amd64
      - run: .github/scripts/build-and-push.sh mysql/5.7/Dockerfile.production mysql/5.7 baijunyao/mysql:5.7-production
        env:
          DOCKER_PLATFORMS: linux/amd64

  mysql_5_6:
    name: MySQL 5.6
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.mysql_5_6 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh mysql/5.6/Dockerfile.local mysql/5.6 baijunyao/mysql:5.6-local
        env:
          DOCKER_PLATFORMS: linux/amd64
      - run: .github/scripts/build-and-push.sh mysql/5.6/Dockerfile.production mysql/5.6 baijunyao/mysql:5.6-production
        env:
          DOCKER_PLATFORMS: linux/amd64

  php:
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.php == 'true'
    strategy:
      matrix:
        version: [ "7.3", "7.4", "8.0", "8.1", "8.2", "8.3", "8.4", "8.5" ]
        mod: [ fpm, cli ]
        target: [ local, production ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh php/Dockerfile php baijunyao/php:${{ matrix.version }}-${{ matrix.mod }}-${{ matrix.target }} --build-arg PHP_MAJOR_VERSION=${{ matrix.version }} --build-arg PHP_MOD=${{ matrix.mod }} --target ${{ matrix.target }}

  php_xlswriter:
    name: PHP with xlswriter
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.php == 'true'
    strategy:
      matrix:
        version: [ "8.1", "8.5" ]
        mod: [ fpm, cli ]
        target: [ local, production ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh php/Dockerfile php baijunyao/php:${{ matrix.version }}-${{ matrix.mod }}-${{ matrix.target }}-xlswriter --build-arg PHP_MAJOR_VERSION=${{ matrix.version }} --build-arg PHP_MOD=${{ matrix.mod }} --build-arg INSTALL_XLSWRITER=true --target ${{ matrix.target }}

  php_nginx:
    name: PHP with NGINX
    needs: [changes, php]
    if: >
      always() &&
      needs.php.result != 'failure' &&
      needs.php.result != 'cancelled' &&
      (
        needs.changes.outputs.all == 'true' ||
        needs.changes.outputs.php == 'true' ||
        needs.changes.outputs.php_nginx == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh php-nginx/Dockerfile php-nginx baijunyao/php-nginx

  redis:
    name: Redis
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.redis == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh redis/6.0/Dockerfile redis/6.0 baijunyao/redis:6.0

  elasticsearch:
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.elasticsearch == 'true'
    strategy:
      matrix:
        include:
          - version: "7.4.1"
            platforms: linux/amd64
          - version: "7.6.2"
            platforms: linux/amd64
          - version: "7.10.1"
            platforms: linux/amd64,linux/arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh elasticsearch/Dockerfile elasticsearch baijunyao/elasticsearch:${{ matrix.version }} --build-arg ELASTICSEARCH_VERSION=${{ matrix.version }}
        env:
          DOCKER_PLATFORMS: ${{ matrix.platforms }}

  kibana:
    name: Kibana
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.kibana == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh kibana/7.10.1/Dockerfile kibana/7.10.1 baijunyao/kibana:7.10.1
        env:
          DOCKER_PLATFORMS: linux/amd64

  fluentd:
    name: Fluentd
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.fluentd == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh fluentd/1.11/Dockerfile fluentd/1.11 baijunyao/fluentd:1.11
        env:
          DOCKER_PLATFORMS: linux/amd64

  ossutil:
    needs: [changes, alpine]
    if: >
      always() &&
      needs.alpine.result != 'failure' &&
      needs.alpine.result != 'cancelled' &&
      (
        needs.changes.outputs.all == 'true' ||
        needs.changes.outputs.alpine == 'true' ||
        needs.changes.outputs.ossutil == 'true'
      )
    strategy:
      matrix:
        version: [ "1.7.0", "2.3.0" ]
        alpine_version: [ "3.23" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh ossutil/Dockerfile ossutil baijunyao/ossutil:${{ matrix.version }} --build-arg OSSUTIL_VERSION=${{ matrix.version }} --build-arg ALPINE_VERSION=${{ matrix.alpine_version }}

  prometheus:
    name: Prometheus
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.prometheus == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh prometheus/2.23.0/Dockerfile prometheus/2.23.0 baijunyao/prometheus:v2.23.0

  node_exporter:
    name: Node exporter
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.node_exporter == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh node-exporter/1.1.2/Dockerfile node-exporter/1.1.2 baijunyao/node-exporter:v1.1.2

  grafana:
    name: Grafana
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.grafana == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh grafana/7.3.4/Dockerfile grafana/7.3.4 baijunyao/grafana:7.3.4

  pnpm:
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.pnpm == 'true'
    strategy:
      matrix:
        version: [ "10" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - run: .github/scripts/build-and-push.sh pnpm/Dockerfile pnpm baijunyao/pnpm:${{ matrix.version }} --build-arg PNPM_VERSION=${{ matrix.version }}

  cert_manager:
    needs: changes
    if: needs.changes.outputs.all == 'true' || needs.changes.outputs.cert_manager == 'true'
    strategy:
      matrix:
        version: [ "1.10.2" ]
        repository: [ "cert-manager-controller", "cert-manager-webhook", "cert-manager-cainjector", "cert-manager-acmesolver", "cert-manager-ctl" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build-setup
        with:
          dockerhub-username: baijunyao
          dockerhub-password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          aliyun-username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          aliyun-password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - name: ${{ matrix.repository }}-v${{ matrix.version }}
        run: |
          docker buildx imagetools create \
            -t registry.cn-beijing.aliyuncs.com/baijunyao/${{ matrix.repository }}:v${{ matrix.version }} \
            quay.io/jetstack/${{ matrix.repository }}:v${{ matrix.version }}
