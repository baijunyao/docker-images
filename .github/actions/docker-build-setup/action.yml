name: Docker build setup
description: Configure registry auth, QEMU, and Buildx for multi-platform Docker builds.

inputs:
  dockerhub-username:
    required: true
  dockerhub-password:
    required: true
  aliyun-username:
    required: true
  aliyun-password:
    required: true

runs:
  using: composite
  steps:
    - uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-password }}
    - uses: docker/login-action@v3
      with:
        registry: registry.cn-beijing.aliyuncs.com
        username: ${{ inputs.aliyun-username }}
        password: ${{ inputs.aliyun-password }}
    - uses: docker/setup-qemu-action@v3
      with:
        platforms: amd64,arm64
    - uses: docker/setup-buildx-action@v3
