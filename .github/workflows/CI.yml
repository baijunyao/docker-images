          password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}
      - name: PHP ${{ matrix.version }}-${{ matrix.mod }}-${{ matrix.target }}
        run: |
          docker build -f php/Dockerfile -t baijunyao/php:${{ matrix.version }}-${{ matrix.mod }}-${{ matrix.target }} php/ --build-arg PHP_MAJOR_VERSION=${{ matrix.version }} --build-arg PHP_MOD=${{ matrix.mod }} --target ${{ matrix.target }}
          docker tag baijunyao/php:${{ matrix.version }}-${{ matrix.mod }}-${{ matrix.target }} registry.cn-beijing.aliyuncs.com/baijunyao/php:${{ matrix.version }}-${{ matrix.mod }}-${{ matrix.target }}
